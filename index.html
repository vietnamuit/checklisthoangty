<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checklist Kiểm Tra Vệ Sinh Định Kỳ</title>
  <meta name="description" content="Checklist kiểm tra vệ sinh định kỳ cho 6 chi nhánh" />
  <style>
    :root{
      --bg:#f6f2ea; --card:#fffaf1; --ink:#2d2118; --muted:#736457; --line:#e2d5c5;
      --brand:#7b2f17; --brand2:#b8863b; --bad:#b42318; --ok:#147a3d; --na:#5d6470;
      --shadow: 0 18px 50px rgba(45,33,24,.12); --radius:18px;
    }
    *{box-sizing:border-box} html{scroll-behavior:smooth}
    body{margin:0; font-family:Arial, Helvetica, sans-serif; background:radial-gradient(circle at top left,#fff7e6 0,#f6f2ea 38%,#efe6d8 100%); color:var(--ink)}
    .wrap{max-width:1180px; margin:0 auto; padding:20px}
    .hero{position:sticky; top:0; z-index:20; padding:14px 0 10px; backdrop-filter:blur(14px); background:rgba(246,242,234,.86); border-bottom:1px solid rgba(226,213,197,.7)}
    .hero-inner{max-width:1180px; margin:0 auto; padding:0 20px; display:flex; gap:16px; align-items:center; justify-content:space-between}
    .brand{display:flex; gap:12px; align-items:center}
    .seal{width:48px; height:48px; border-radius:50%; display:grid; place-items:center; color:#fff; font-weight:900; letter-spacing:.5px; background:linear-gradient(135deg,var(--brand),#39170e); box-shadow:0 8px 24px rgba(123,47,23,.28)}
    h1{font-size:22px; line-height:1.12; margin:0; text-transform:uppercase; letter-spacing:.4px}.subtitle{font-size:13px;color:var(--muted);margin-top:4px}
    .quick-actions{display:flex; flex-wrap:wrap; gap:8px; justify-content:flex-end}.btn{appearance:none;border:0;border-radius:999px;padding:11px 14px;font-weight:800;cursor:pointer;color:#fff;background:var(--brand);box-shadow:0 8px 18px rgba(123,47,23,.2)}
    .btn.secondary{background:#34251b}.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:none}.btn.danger{background:var(--bad)}
    .grid{display:grid; grid-template-columns:repeat(12,1fr); gap:14px}.card{background:rgba(255,250,241,.92);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}
    .info{margin-top:18px}.field{display:flex;flex-direction:column;gap:6px}.field label{font-size:13px;font-weight:800;color:var(--muted)} input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;background:#fff;padding:11px 12px;font:inherit;color:var(--ink)} textarea{min-height:70px;resize:vertical}.col-3{grid-column:span 3}.col-4{grid-column:span 4}.col-6{grid-column:span 6}.col-12{grid-column:span 12}
    .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:14px}.stat{padding:12px;border-radius:14px;background:#fff;border:1px solid var(--line);text-align:center}.stat b{font-size:22px;display:block}.stat span{font-size:12px;color:var(--muted);font-weight:800}.ok{color:var(--ok)}.bad{color:var(--bad)}.na{color:var(--na)}
    .sections{margin-top:16px}.section{margin-bottom:16px;overflow:hidden}.section-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 16px;background:linear-gradient(135deg,#4a2418,var(--brand));color:#fff;border-radius:16px 16px 0 0}.section-head h2{font-size:16px;margin:0;text-transform:uppercase}.section-count{font-size:12px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:6px 10px;font-weight:900;white-space:nowrap}
    .items{background:var(--card);border:1px solid var(--line);border-top:0;border-radius:0 0 16px 16px}.item{display:grid;grid-template-columns:58px 1fr 320px;gap:12px;padding:14px;border-top:1px solid var(--line);align-items:start}.item:first-child{border-top:0}.no{font-weight:900;color:var(--brand);background:#fff;border:1px solid var(--line);border-radius:12px;text-align:center;padding:10px}.item-title{font-weight:800;line-height:1.35}.controls{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.pill input{display:none}.pill span{display:block;text-align:center;border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 8px;font-size:13px;font-weight:900;cursor:pointer}.pill input:checked + span.ok-bg{background:#eaf7ef;color:var(--ok);border-color:#a8dab9}.pill input:checked + span.bad-bg{background:#fff0ee;color:var(--bad);border-color:#f1b8b3}.pill input:checked + span.na-bg{background:#f2f4f7;color:var(--na);border-color:#cbd1d8}.note{grid-column:2/4;margin-top:-2px}.note input{padding:10px 12px}.summary-box{display:grid;grid-template-columns:1fr 1fr;gap:14px}.print-only{display:none}.footer-note{font-size:12px;color:var(--muted);text-align:center;margin:18px 0 40px}
    .floating{position:fixed;right:18px;bottom:18px;display:flex;gap:8px;z-index:30}.floating .btn{box-shadow:0 12px 30px rgba(45,33,24,.2)}
    @media(max-width:900px){.hero-inner{align-items:flex-start;flex-direction:column}.quick-actions{justify-content:flex-start}.col-3,.col-4,.col-6{grid-column:span 12}.stats{grid-template-columns:repeat(2,1fr)}.item{grid-template-columns:44px 1fr;gap:10px}.controls{grid-column:1/3}.note{grid-column:1/3}.floating{left:12px;right:12px}.floating .btn{flex:1}.brand h1{font-size:18px}}
    @media print{body{background:#fff;color:#000}.hero,.floating,.quick-actions,.no-print{display:none!important}.wrap{max-width:none;padding:0}.card{box-shadow:none;border:0;border-radius:0;padding:0}.info{margin-top:0}.print-only{display:block}.print-title{text-align:center;text-transform:uppercase;font-size:22px;font-weight:900;margin-bottom:10px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.field label{font-size:10px}.field input,.field select,.field textarea{border:0;border-bottom:1px solid #000;border-radius:0;padding:4px;background:#fff}.stats{display:flex;gap:6px;margin:8px 0}.stat{border:1px solid #000;border-radius:0;padding:5px}.stat b{font-size:14px}.section{page-break-inside:auto;margin-bottom:6px}.section-head{background:#eee!important;color:#000;border:1px solid #000;border-radius:0;padding:6px 8px}.section-head h2{font-size:12px}.section-count{display:none}.items{border:1px solid #000;border-top:0;border-radius:0}.item{display:grid;grid-template-columns:34px 1fr 90px 90px 120px;gap:0;border-top:1px solid #000;padding:0;min-height:28px}.no{border:0;border-right:1px solid #000;border-radius:0;padding:6px 3px;background:#fff;color:#000;font-size:11px}.item-title{padding:6px;font-size:11px;font-weight:400;border-right:1px solid #000}.controls{display:contents}.pill span{border:0;border-right:1px solid #000;border-radius:0;padding:6px 2px;font-size:11px;background:#fff!important;color:#000!important}.pill input:not(:checked)+span::after{content:""}.pill input:checked+span::after{content:"✓";font-weight:900;font-size:14px}.pill input:checked+span{font-size:0}.note{grid-column:auto;margin:0}.note input{border:0;border-radius:0;padding:6px;font-size:10px}.note input::placeholder{color:transparent}.summary-box{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}.footer-note{display:none} @page{size:A4;margin:10mm}}
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-inner">
      <div class="brand"><div class="seal">HT</div><div><h1>Checklist kiểm tra vệ sinh định kỳ</h1><div class="subtitle">6 chi nhánh · Tick nhanh trên điện thoại · Xuất PDF báo cáo</div></div></div>
      <div class="quick-actions"><button class="btn ghost" onclick="saveDraft()">Lưu tạm</button><button class="btn secondary" onclick="copyReport()">Copy báo cáo</button><button class="btn" onclick="window.print()">Xuất PDF</button></div>
    </div>
  </div>
  <main class="wrap">
    <div class="card info">
      <div class="print-only print-title">Checklist kiểm tra vệ sinh định kỳ</div>
      <div class="grid">
        <div class="field col-4"><label>Chi nhánh</label><select id="branch"><option value="">-- Chọn chi nhánh --</option></select></div>
        <div class="field col-4"><label>Người kiểm tra</label><input id="inspector" placeholder="Nhập tên người kiểm tra" /></div>
        <div class="field col-4"><label>Ngày kiểm tra</label><input id="date" type="date" /></div>
        <div class="field col-3"><label>Ca kiểm tra</label><select id="shift"><option>Sáng</option><option>Trưa</option><option>Tối</option><option>Đột xuất</option></select></div>
        <div class="field col-3"><label>Người/nhóm phụ trách xử lý</label><input id="owner" placeholder="VD: QL chi nhánh / Bếp / Phục vụ" /></div>
        <div class="field col-3"><label>Hạn khắc phục</label><input id="deadline" type="date" /></div>
        <div class="field col-3"><label>Mức độ chung</label><select id="level"><option>Bình thường</option><option>Cần nhắc nhở</option><option>Cần xử lý ngay</option><option>Nghiêm trọng</option></select></div>
      </div>
      <div class="stats" id="stats"></div>
    </div>
    <div class="sections" id="sections"></div>
    <div class="card">
      <div class="summary-box">
        <div class="field"><label>Kết luận chung</label><textarea id="conclusion" placeholder="Nhận xét tổng quan sau kiểm tra..."></textarea></div>
        <div class="field"><label>Yêu cầu khắc phục / Ghi chú bàn giao</label><textarea id="actionPlan" placeholder="Ghi rõ việc cần làm, ai phụ trách, hạn xử lý..."></textarea></div>
      </div>
      <div class="grid" style="margin-top:14px">
        <div class="field col-6"><label>Chữ ký người kiểm tra</label><input placeholder="Ký tên / ghi họ tên khi in PDF" /></div>
        <div class="field col-6"><label>Xác nhận quản lý chi nhánh</label><input placeholder="Ký tên / ghi họ tên khi in PDF" /></div>
      </div>
      <div class="quick-actions no-print" style="margin-top:16px;justify-content:flex-start"><button class="btn" onclick="window.print()">Xuất PDF báo cáo</button><button class="btn ghost" onclick="downloadJson()">Tải dữ liệu JSON</button><button class="btn danger" onclick="clearForm()">Xóa form</button></div>
    </div>
    <p class="footer-note">Hoàng Ty / Cơm Gà Thượng Hải · Website: hoangty.vn · Hotline: 1900 0091</p>
  </main>
  <div class="floating no-print"><button class="btn secondary" onclick="scrollToFirstBad()">Xem lỗi</button><button class="btn" onclick="window.print()">PDF</button></div>
<script>
const branches = [
  'Hoàng Ty 74 Trương Quốc Dung - Phường Phú Nhuận, TP.HCM',
  'Hoàng Ty 01 Nguyễn Hữu Cầu - Phường Tân Định, TP.HCM',
  'Hoàng Ty 32 Hoa Mai - Phường Cầu Kiệu, TP.HCM',
  'Hoàng Ty 38 Mạc Đĩnh Chi - Phường Tân Định, TP.HCM',
  'Hoàng Ty 73 Trần Não - Phường An Khánh, TP.HCM',
  'Cơm Gà Thượng Hải'
];
const checklist = [
 {title:'Khu vực ngoài nhà hàng / Đội xe', items:[
  [1,'Cổng rào: cửa cuốn, cửa xếp...'],[2,'Hàng rào, tường rào, mái hiên'],[3,'Bảng hiệu: alu, đèn led'],[4,'Vỉa hè xung quanh khuôn viên nhà hàng'],[5,'Tác phong, đồng phục đội xe']
 ]},
 {title:'Khu phục vụ khách hàng', items:[
  [6,'Đèn điện, máy lạnh'],[7,'Cửa kính, vách kính, vách tường, cửa sổ'],[9,'Bếp cồn, mâm tiếp món, mâm nước mắm + mắm nêm'],[10,'Thang máy, bàn tiếp thực'],[11,'Hộp đèn quảng cáo treo tường'],[12,'Vệ sinh, sắp xếp ngăn nắp bàn ghế'],[13,'Vệ sinh khay nước chấm, hũ ớt'],[14,'Vệ sinh hộp muỗng, đũa, mâm lấy đồ thêm'],[15,'Sàn nhà khô ráo, sạch sẽ'],[16,'Vệ sinh cầu thang, trần nhà'],[17,'Tác phong, đồng phục, bảng tên nhân viên'],[18,'Menu giấy, standee/menu điện tử: số lượng, bảo quản, vệ sinh'],[19,'Tình trạng tablet: pin, sắp xếp'],[20,'Quầy lễ tân, tủ, kệ, ghế; hệ thống máy chủ, máy giao hàng, điện thoại; vệ sinh bàn ghế tầng trệt, khay gia vị, muỗng đũa']
 ]},
 {title:'Khu vực bếp', items:[
  [22,'Dụng cụ chế biến: xoong nồi, vá, dao, thớt...'],[23,'Kệ, tủ inox, ngăn kéo tủ, bàn ra đồ'],[24,'Kiểm tra ngẫu nhiên tô, chén, dĩa'],[25,'Bếp nướng, lò cá lu'],[26,'Máng khói, quạt hút'],[27,'Kho gas, toàn bộ bếp khè'],[28,'Máy cắt thịt: vệ sinh, bảo trì'],[29,'Tác phong, đồng phục nhân viên'],[30,'Nước lèo, nước trụng luôn sẵn sàng'],[31,'Bảo quản thực phẩm có dùng màng bọc hay không'],[32,'Bếp chiên dầu có vớt cặn hay không'],[33,'Tất cả các loại cân: cân cơ, cân điện tử'],[34,'Bồn rửa: vòi nước, vệ sinh'],[35,'Vệ sinh khu vực làm cá lu'],[36,'Khu vực để rác']
 ]},
 {title:'Khu vực chè gỏi - đồ về - pha chế', items:[
  [37,'Ly, rổ để ly trà đá, ly mía, ly sinh tố'],[38,'Thùng đá, bồn rửa ly, vòi nước'],[39,'Thố, nắp, muỗng khúc bạch'],[40,'Các loại chè: đậu xanh, lựu, khúc bạch ra món'],[41,'Tủ mát pha chế, tủ chè, tủ dụng cụ chè gỏi, tủ mát đồ về'],[42,'Định lượng, số lượng toàn bộ các món ra đồ về'],[43,'Kệ, tủ inox, ngăn kéo tủ, bàn ra đồ'],[44,'Đồng phục và tác phong nhân viên đứng khâu: bao tay, nón, yếm, đảm bảo VSATTP'],[45,'Bàn ra chè, bàn cuốn gỏi, quy trình ra món đảm bảo VSATTP'],[46,'Quy trình bảo quản nguyên vật liệu'],[47,'Vệ sinh công cụ dụng cụ: máy mía, mâm pha chế'],[48,'Sàn nhà, khu vực để túi mang về'],[49,'Số lượng hàng tồn và bảo quản hàng qua ngày']
 ]},
 {title:'Khu vực nước chấm', items:[
  [53,'Kệ, tủ inox, ngăn kéo tủ, bàn ra đồ, sàn nhà'],[54,'Kiểm tra ngẫu nhiên tô, chén, dĩa'],[55,'Đồ chua, nước mắm, mắm nêm, dưa giá'],[56,'Tác phong, đồng phục nhân viên'],[57,'Quy trình ra món sẵn phục vụ khách: số lượng mắm, dưa giá, đồ chua, bún, bánh tráng; quy trình bảo quản nguyên vật liệu']
 ]},
 {title:'Khu vực rửa rau - rửa chén', items:[
  [58,'Kệ, tủ inox, ngăn kéo tủ, bàn để chén dĩa khu vực rửa chén'],[59,'Hoạt động máy rửa chén, bồn rửa chén'],[60,'Kiểm tra ngẫu nhiên tô, chén, dĩa'],[61,'Vệ sinh rổ để chén dĩa, rổ để muỗng đũa'],[62,'Kệ, tủ inox, ngăn kéo tủ, bàn để chén dĩa khu vực rau'],[63,'Bồn rửa: vòi nước, vệ sinh, máy ozone'],[64,'Kiểm tra ngẫu nhiên vệ sinh khay rau'],[65,'Định lượng rau ra mâm, tủ rau, hệ thống phun sương'],[66,'Quy trình bảo quản rau']
 ]},
 {title:'Khu vực toilet', items:[[67,'Gương soi, bồn cầu, sàn nhà, vách ngăn'],[68,'Bồn rửa mặt, vòi nước']]},
 {title:'Khu vực sinh hoạt nhân viên', items:[[69,'Sàn phơi đồ, WC'],[70,'Đèn, quạt, thiết bị điện, rèm ngủ khu vực nhân viên'],[71,'Cầu thang lên xuống lầu 2, đổ rác'],[72,'Kệ giày dép nhân viên'],[73,'Vị trí miệng cống thoát nước']]}
];
const $ = id => document.getElementById(id);
function init(){
  branches.forEach(b=>{const o=document.createElement('option'); o.textContent=b; o.value=b; $('branch').appendChild(o)});
  $('date').value = new Date().toISOString().slice(0,10);
  renderSections(); loadDraft(); updateStats();
  document.querySelectorAll('input,select,textarea').forEach(el=>el.addEventListener('input',()=>{updateStats(); autoSave()}));
}
function renderSections(){
  const root=$('sections'); root.innerHTML='';
  checklist.forEach((sec,si)=>{
    const card=document.createElement('section'); card.className='section card'; card.id='sec-'+si;
    card.innerHTML=`<div class="section-head"><h2>${sec.title}</h2><div class="section-count">${sec.items.length} mục</div></div><div class="items"></div>`;
    const list=card.querySelector('.items');
    sec.items.forEach(([id,text])=>{
      const row=document.createElement('div'); row.className='item'; row.dataset.item=id;
      row.innerHTML=`<div class="no">${id}</div><div class="item-title">${text}</div><div class="controls">
        <label class="pill"><input type="radio" name="st_${id}" value="Đạt"><span class="ok-bg">Đạt</span></label>
        <label class="pill"><input type="radio" name="st_${id}" value="Không đạt"><span class="bad-bg">K. đạt</span></label>
        <label class="pill"><input type="radio" name="st_${id}" value="N/A"><span class="na-bg">N/A</span></label>
      </div><div class="note"><input name="note_${id}" placeholder="Ghi chú / hình ảnh / yêu cầu xử lý..." /></div>`;
      list.appendChild(row);
    });
    root.appendChild(card);
  });
}
function getData(){
  const items=[]; checklist.forEach(sec=>sec.items.forEach(([id,text])=>{
    const checked=document.querySelector(`input[name="st_${id}"]:checked`);
    const note=document.querySelector(`input[name="note_${id}"]`).value.trim();
    items.push({id, section:sec.title, text, status:checked?checked.value:'', note});
  }));
  return {branch:$('branch').value, inspector:$('inspector').value, date:$('date').value, shift:$('shift').value, owner:$('owner').value, deadline:$('deadline').value, level:$('level').value, conclusion:$('conclusion').value, actionPlan:$('actionPlan').value, items};
}
function setData(data){
  ['branch','inspector','date','shift','owner','deadline','level','conclusion','actionPlan'].forEach(id=>{ if(data[id]!==undefined) $(id).value=data[id]; });
  (data.items||[]).forEach(it=>{ if(it.status){ const r=document.querySelector(`input[name="st_${it.id}"][value="${it.status}"]`); if(r) r.checked=true;} const n=document.querySelector(`input[name="note_${it.id}"]`); if(n) n.value=it.note||''; });
}
function updateStats(){
  const d=getData(); const total=d.items.length, ok=d.items.filter(i=>i.status==='Đạt').length, bad=d.items.filter(i=>i.status==='Không đạt').length, na=d.items.filter(i=>i.status==='N/A').length, pending=total-ok-bad-na;
  const score = total-na ? Math.round(ok/(total-na)*100) : 0;
  $('stats').innerHTML=`<div class="stat"><b>${total}</b><span>Tổng mục</span></div><div class="stat"><b class="ok">${ok}</b><span>Đạt</span></div><div class="stat"><b class="bad">${bad}</b><span>Không đạt</span></div><div class="stat"><b class="na">${na}</b><span>N/A</span></div><div class="stat"><b>${score}%</b><span>Điểm đạt</span></div>`;
}
let saveTimer; function autoSave(){ clearTimeout(saveTimer); saveTimer=setTimeout(()=>localStorage.setItem('ht_clean_checklist',JSON.stringify(getData())),400); }
function saveDraft(){ localStorage.setItem('ht_clean_checklist',JSON.stringify(getData())); alert('Đã lưu tạm trên máy này.'); }
function loadDraft(){ const raw=localStorage.getItem('ht_clean_checklist'); if(raw){ try{setData(JSON.parse(raw))}catch(e){} } }
function clearForm(){ if(!confirm('Xóa toàn bộ nội dung đang tick?')) return; localStorage.removeItem('ht_clean_checklist'); document.querySelectorAll('input[type="radio"]').forEach(r=>r.checked=false); document.querySelectorAll('input[name^="note_"]').forEach(i=>i.value=''); ['inspector','owner','deadline','conclusion','actionPlan'].forEach(id=>$(id).value=''); $('branch').value=''; $('date').value=new Date().toISOString().slice(0,10); updateStats(); }
function downloadJson(){ const d=getData(); const blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`checklist-ve-sinh-${(d.branch||'chi-nhanh').replace(/\W+/g,'-')}-${d.date||''}.json`; a.click(); URL.revokeObjectURL(a.href); }
function reportText(){ const d=getData(); const bad=d.items.filter(i=>i.status==='Không đạt'); const ok=d.items.filter(i=>i.status==='Đạt').length; const na=d.items.filter(i=>i.status==='N/A').length; const total=d.items.length; let txt=`BÁO CÁO CHECKLIST VỆ SINH\nChi nhánh: ${d.branch}\nNgày: ${d.date} - Ca: ${d.shift}\nNgười kiểm tra: ${d.inspector}\nKết quả: Đạt ${ok}/${total-na} mục, Không đạt ${bad.length} mục, N/A ${na} mục\nMức độ: ${d.level}\n`; if(bad.length){ txt+=`\nCÁC MỤC KHÔNG ĐẠT:\n`+bad.map(i=>`- ${i.id}. ${i.text}${i.note?` | Ghi chú: ${i.note}`:''}`).join('\n'); } txt+=`\n\nKết luận: ${d.conclusion||''}\nYêu cầu khắc phục: ${d.actionPlan||''}\nPhụ trách: ${d.owner||''}\nHạn xử lý: ${d.deadline||''}`; return txt; }
async function copyReport(){ try{ await navigator.clipboard.writeText(reportText()); alert('Đã copy báo cáo. Dán vào Zalo/group là được.'); } catch(e){ prompt('Copy báo cáo:', reportText()); } }
function scrollToFirstBad(){ const bad=document.querySelector('input[value="Không đạt"]:checked'); if(!bad){alert('Chưa có mục Không đạt.'); return;} bad.closest('.item').scrollIntoView({behavior:'smooth',block:'center'}); }
init();
</script>
